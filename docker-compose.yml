services:
  postgres:
    image: postgres:17-alpine
    container_name: express-prisma-postgres-api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: express_prisma_postgres_api
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-shadow-db.sql:/docker-entrypoint-initdb.d/init-shadow-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d express_prisma_postgres_api"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
